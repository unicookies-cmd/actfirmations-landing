<!-- index.html — UniCookies (correct script order, cache-busting, LOADING fix) -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#2aace2" />
  <title>UniCookies — A Sweet Message</title>

  <!-- Optional: your existing CSS -->
  <link rel="stylesheet" href="./styles.css?v=20260208_03" />

  <!-- Optional: fonts (keep if you already use them) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- IMPORTANT:
       - Use defer so DOM exists before app.js runs
       - Load cookie-messages.js BEFORE app.js
       - Cache-bust both scripts whenever you deploy changes
  -->
  <script src="./cookie-messages.js?v=20260208_03" defer></script>
  <script src="./app.js?v=20260208_03" defer></script>
</head>

<body>
  <main class="page">
    <section class="card" role="region" aria-label="UniCookies message card">
      <div class="brand">
        <img class="logo" src="./assets/logo.png" alt="UniCookies" />
      </div>

      <!-- Cookie line (shown only when cookie param exists) -->
      <div id="cookieLine" class="cookie-line" style="display:none;"></div>

      <div class="subtitle">A SWEET MESSAGE FOR YOU</div>

      <!-- ✅ This is the element app.js writes into.
           Never remove. Default shows LOADING... -->
      <div id="affirmation" class="affirmation">LOADING...</div>

      <!-- Collection counter -->
      <div id="collectionLine" class="collection-line"></div>

      <div class="actions">
        <button id="copyBtn" class="btn" type="button">Copy</button>
        <button id="shareBtn" class="btn" type="button">Share</button>
        <button id="storyBtn" class="btn btn-primary" type="button">Make Story Card</button>
      </div>

      <hr class="divider" />

      <div class="tip">Tip: Share your message and tag <strong>@eatunicookies</strong>.</div>

      <div class="social">
        <a class="icon" href="https://www.instagram.com/eatunicookies/" target="_blank" rel="noopener" aria-label="Instagram">
          <!-- Replace with your icon SVG if you have it -->
          <span>IG</span>
        </a>
        <a class="icon" href="https://www.tiktok.com/@eatunicookies" target="_blank" rel="noopener" aria-label="TikTok">
          <span>TT</span>
        </a>
        <a class="icon" href="https://www.youtube.com/" target="_blank" rel="noopener" aria-label="YouTube">
          <span>YT</span>
        </a>
      </div>

      <!-- Toast -->
      <div id="toast" class="toast" style="display:none;"></div>
    </section>
  </main>
</body>
</html>
